name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Base path phải khớp tên repo (subpath). Đổi ở đây nếu bạn rename repo.
      BASE_PATH: /duongthithuthao--25051054/
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Prefix public asset URLs for GitHub Pages
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          base = os.environ.get("BASE_PATH", "/").strip() or "/"
          if not base.startswith("/"):
              base = "/" + base
          base = base.rstrip("/")

          for path in Path("src/assets").rglob("*.asset.json"):
              data = json.loads(path.read_text(encoding="utf-8"))
              url = data.get("url")
              if isinstance(url, str) and url.startswith("/lov-assets/"):
                  data["url"] = f"{base}{url}"
                  path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Build static site for GitHub Pages
        run: bun run build:gh-pages
        env:
          BASE_PATH: ${{ env.BASE_PATH }}

      - name: Prepare static output
        run: |
          if [ ! -d "dist-gh-pages" ]; then
            echo "Không tìm thấy dist-gh-pages sau khi build." >&2
            exit 1
          fi

          if [ ! -f "dist-gh-pages/index.html" ]; then
            echo "Thiếu index.html trong dist-gh-pages." >&2
            ls -la dist-gh-pages || true
            exit 1
          fi

          # SPA fallback: index.html -> 404.html để refresh route sâu không 404
          cp dist-gh-pages/index.html dist-gh-pages/404.html

          # Chặn Jekyll xử lý (nếu có tên bắt đầu bằng _)
          touch dist-gh-pages/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-gh-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
