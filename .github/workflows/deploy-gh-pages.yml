name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Base path phải khớp tên repo (subpath). Đổi ở đây nếu bạn rename repo.
      BASE_PATH: /duongthithuthao--25051054/
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Build
        run: bun run build
        env:
          BASE_PATH: ${{ env.BASE_PATH }}

      - name: Prepare static output
        run: |
          # Nitro TanStack Start ghi output ra .output/public (client bundle + assets)
          if [ ! -d ".output/public" ]; then
            echo "Không tìm thấy .output/public — build có thể đã đổi cấu trúc." >&2
            ls -la .output || true
            exit 1
          fi

          # Copy toàn bộ public/ (chứa ảnh .lov-assets) vào output nếu chưa có
          if [ -d "public" ]; then
            cp -rn public/. .output/public/ 2>/dev/null || true
          fi

          # SPA fallback: index.html -> 404.html để refresh route sâu không 404
          if [ -f ".output/public/index.html" ]; then
            cp .output/public/index.html .output/public/404.html
          fi

          # Chặn Jekyll xử lý (nếu có tên bắt đầu bằng _)
          touch .output/public/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
